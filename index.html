<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agropecuaria Valdense - Logística</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="p-3 text-center bg-success text-white">
  <h1 class="h5 mb-0">Agropecuaria Valdense</h1>
  <small>Sistema de Ubicaciones</small>
</header>

<div class="container-fluid p-2">

  <div class="row g-2">

    <!-- PANEL CLIENTES -->
    <div class="col-lg-4">

      <div class="clients-panel">

        <input
          type="text"
          id="searchInput"
          class="form-control mb-2"
          placeholder="Buscar cliente por nombre..."
        />

        <div id="clientList"></div>

      </div>

    </div>

    <!-- PANEL MAPA -->
    <div class="col-lg-8">

      <div id="map"></div>

    </div>

  </div>

</div>

<!-- Modal Clientes Cercanos -->
<div class="modal fade" id="nearbyModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="nearbyModalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="nearbyModalBody"></div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
